# docker-compose.yml
version: '3.8'

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: exam-sqlserver
    restart: always
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "ExamSystem!2026"  # Change in production!
      MSSQL_PID: "Developer"
      MSSQL_COLLATION: "SQL_Latin1_General_CP1_CI_AS"
      MSSQL_MEMORY_LIMIT_MB: 2048
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./sqlserver/init:/docker-entrypoint-initdb.d
      - ./sqlserver/backups:/backups
    networks:
      - exam-network
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "ExamSystem!2026", "-Q", "SELECT 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: exam-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - exam-network
    command: redis-server --appendonly yes --requirepass "RedisPass!2026"

  # Optional: Adminer for database management
  adminer:
    image: adminer
    container_name: exam-adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - exam-network

volumes:
  sqlserver_data:
    driver: local
  redis_data:
    driver: local

networks:
  exam-network:
    driver: bridge